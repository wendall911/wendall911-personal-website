<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
            // Apply theme before first paint to avoid a flash of the wrong mode.
            // Precedence: stored preference > system (when 'system') > default dark.
            (function () {
                var stored = localStorage.getItem('mode');
                var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'dark';
                var light =
                    mode === 'light' ||
                    (mode === 'system' && !window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.classList.toggle('light', light);
                document.documentElement.style.colorScheme = light ? 'light' : 'dark';
            })();
        </script>
        <link
            rel="preload"
            as="image"
            type="image/webp"
            href="%sveltekit.assets%/images/sunrise.webp"
            fetchpriority="high"
        />
        <link
            rel="preload"
            as="font"
            type="font/woff2"
            crossorigin
            href="%sveltekit.assets%/fonts/open-sans-latin.woff2"
        />
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
